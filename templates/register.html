{% extends "base.html" %}
{% block body %}
<div class="container">
    <div class="form-wrapper" style="max-width: 400px; margin: 50px auto; text-align: center;">
        <h2>Daftar Akun Baru</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div style="color: red; margin-bottom: 15px;">
              {% for message in messages %}
                <p>{{ message }}</p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group" style="text-align: left;">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group" style="text-align: left;">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-add" style="width: 100%;">Register</button>
        </form>
        <p style="margin-top: 15px;">Sudah punya akun? <a href="{{ url_for('login') }}">Login di sini</a></p>
    </div>
</div>
{% endblock %}
