{% extends "base.html" %}

{% block body %}
<div class="container">
    <div class="form-wrapper">
        <h2>Edit Koleksi Seni</h2>
        
        <!-- TAMBAHKAN enctype="multipart/form-data" -->
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Nama Karya Seni</label>
                <input type="text" name="name" value="{{ art.name }}" required>
            </div>

            <div class="form-group">
                <label>Nama Artist (Ketik nama untuk mencari)</label>
                <input list="artist-list" name="artist_name" value="{{ art.artist.name }}" placeholder="Cari nama artist..." required>
                <datalist id="artist-list">
                    {% for artist in artists %}
                    <option value="{{ artist.name }}">
                    {% endfor %}
                </datalist>
            </div>

            <!-- INPUT BARU: Kolom Pilih File Gambar -->
            <div class="form-group">
                <label>Ubah Gambar Karya (Kosongkan jika tidak ingin ganti)</label>
                <input type="file" name="image" accept="image/*">
                {% if art.image_url %}
                    <p style="font-size: 0.8rem; color: #666;">Gambar saat ini: {{ art.image_url.split('/')[-1] }}</p>
                {% endif %}
            </div>

            <div class="form-group">
                <label>Deskripsi</label>
                <textarea name="description" rows="5">{{ art.description }}</textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-add">Update Art</button>
                <a href="{{ url_for('art') }}" class="btn-cancel">Batal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
