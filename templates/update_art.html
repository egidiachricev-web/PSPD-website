{% extends "base.html" %}

{% block body %}
<div class="container">
    <div class="form-wrapper">
        <h2>Edit Koleksi Seni</h2>
        
        <!-- Action-nya mengarah ke ID art yang sedang diedit -->
        <form method="POST">
            <div class="form-group">
                <label>Nama Karya Seni</label>
                <input type="text" name="name" value="{{ art.name }}" required>
            </div>

            <div class="form-group">
                <label>Nama Artist (Ketik nama untuk mencari)</label>
                <!-- Kita pakai value="{{ art.artist.name }}" supaya nama artist lamanya muncul otomatis -->
                <input list="artist-list" name="artist_name" value="{{ art.artist.name }}" placeholder="Cari nama artist..." required>
                <datalist id="artist-list">
                    {% for artist in artists %}
                    <option value="{{ artist.name }}">
                    {% endfor %}
                </datalist>
            </div>

            <div class="form-group">
                <label>Deskripsi</label>
                <textarea name="description" rows="5">{{ art.description }}</textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-add">Update Art</button>
                <a href="{{ url_for('art') }}" class="btn-cancel">Batal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
