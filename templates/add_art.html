{% extends "base.html" %}
{% block body %}
<div class="container">
    <div class="form-wrapper">
        <h2>Tambah Koleksi Seni Baru</h2>
        <!-- 1. DITAMBAH enctype supaya bisa kirim file gambar -->
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Art Name</label>
                <input type="text" name="name" placeholder="Example: The Starry Night" required>
            </div>

            <!-- BAGIAN PILIH ARTIST (MODEL KETIK) -->
            <div class="form-group">
                <label>Artist Name</label>
                <input list="artist-list" name="artist_name" placeholder="Example: Vincent van Gogh" required>
                <datalist id="artist-list">
                    <!-- 2. DITAMBAH loop supaya nama artist muncul otomatis -->
                    {% for artist in artists %}
                    <option value="{{ artist.name }}">
                    {% endfor %}
                </datalist>
            </div>

            <!-- 3. BAGIAN BARU: INPUT GAMBAR -->
            <div class="form-group">
                <label>Upload Picture</label>
                <input type="file" name="picture" accept="image/*" required>
                <small style="color: gray; display: block;">Accepted formats: JPG, PNG, JPEG</small>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="5" placeholder="Example: A beautiful night sky with swirling clouds..."></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-add">Add New Art</button>
                <a href="{{ url_for('art') }}" class="btn-cancel">Batal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
