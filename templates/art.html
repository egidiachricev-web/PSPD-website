{% extends "base.html" %}

{% block content %}
<div class="breadcrumbs">
    <a href="/">Home</a> / <span>Art Archive</span>
</div>

<header>
    <h1>Arsip Museum</h1>
    <p class="subtitle-italic">Sneak peek into our art collection!</p>
</header>

<main class="container">
    <div class="search-container" style="text-align: center; margin-bottom: 30px;">
        <input type="text" id="searchArt" placeholder="Cari karya seni..." onkeyup="searchArt()" 
               style="width: 100%; max-width: 400px; padding: 12px; border-radius: 25px; border: 1px solid #ccc;">
    </div>

    <div class="grid" id="artGrid">
        {% for art in all_art %}
        <div class="card-college">
            <div class="card-image">
                <img src="{{ url_for('static', filename='image/' + art.id|string + '.jpg') }}" alt="{{ art.name }}">
            </div>
            <div class="card-content">
                <span class="category" style="color: var(--accent); font-weight: bold;">{{ art.artist.name }}</span>
                <h3>{{ art.name }}</h3>
                <p>{{ art.description }}</p>
                
                <div class="actions">
                    <a href="{{ url_for('update_art', id=art.id) }}" class="btn-detail" style="background-color: #f0ad4e;">Edit</a>
                    <a href="{{ url_for('delete_art', id=art.id) }}" class="btn-detail" style="background-color: #d9534f;" onclick="return confirm('Yakin mau hapus?')">Hapus</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <div style="text-align: center; margin-top: 50px;">
        <a href="/add-art" class="btn-add">+ Add New Art</a>
    </div>
</main>

<script>
function searchArt() {
    let input = document.getElementById("searchArt").value.toLowerCase();
    let cards = document.querySelectorAll(".card-college");

    cards.forEach(card => {
        let title = card.querySelector("h3").innerText.toLowerCase();
        card.style.display = title.includes(input) ? "flex" : "none";
    });
}
</script>
{% endblock %}
